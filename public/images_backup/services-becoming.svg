<svg width="1200" height="1500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&amp;family=Cormorant+Garamond:ital,wght@1,300;1,400;1,500;1,600&amp;display=swap');
    </style>
    <linearGradient id="becomingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d3748;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a202c;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#becomingGrad)"/>
  
  <text x="50%" y="42%" dominant-baseline="middle" text-anchor="middle" font-family="'Outfit', sans-serif" font-size="72" fill="rgba(255,255,255,0.95)" font-weight="700" letter-spacing="2">Becoming</text>
  
  <!-- Subtitle -->
  <text x="50%" y="48%" dominant-baseline="middle" text-anchor="middle" font-family="'Outfit', sans-serif" font-size="36" fill="rgba(255,255,255,0.7)" font-weight="600" letter-spacing="4">1:1 COACHING SERIES</text>
  
  <!-- Tagline -->
  <text x="50%" y="56%" dominant-baseline="middle" text-anchor="middle" font-family="'Outfit', sans-serif" font-size="38" fill="rgba(198,160,123,0.9)" font-weight="600">Deep transformation. Steady support.</text>
  <text x="50%" y="61%" dominant-baseline="middle" text-anchor="middle" font-family="'Outfit', sans-serif" font-size="38" fill="rgba(198,160,123,0.9)" font-weight="600">Sacred space.</text>
  
  <!-- Decorative line -->
  <line x1="40%" y1="64%" x2="60%" y2="64%" stroke="rgba(198,160,123,0.3)" stroke-width="2"/>
</svg>
